<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ProSFF</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{background:#080808;color:white;font-family:Arial;overflow:hidden;}
.slide{display:none;min-height:100vh;padding:20px;flex-direction:column;justify-content:center;align-items:center;text-align:center;opacity:0;transform: translateX(30px);transition: all 0.5s ease;}
.slide.active{display:flex;opacity:1;transform: translateX(0);}
.card{background:#121212;border:1px solid #222;padding:22px;border-radius:25px;max-width:520px;width:100%;}
.btn{background:#00ff88;color:black;padding:14px;border-radius:50px;margin-top:10px;width:100%;font-weight:bold;}
.btn-back{background:#222;color:#aaa;padding:10px;border-radius:50px;margin-top:10px;width:100%;}
.progress{position:fixed;top:0;left:0;height:4px;background:#00ff88;width:0%;z-index:999;}
iframe{width:100%;height:240px;border-radius:15px;}
img{width:100%;border-radius:15px;transition: all 0.2s ease;}
.nav{display:flex;gap:10px;margin-top:10px;}
</style>
</head>

<body>

<div class="progress" id="progress"></div>
<audio id="audio"></audio>

<script>
let perfil="", interacoes=0;
document.addEventListener("click",()=>interacoes++);

let audio=document.getElementById("audio");
let trilha=["audio/intro.mp3","audio/middle.mp3","audio/final.mp3"];
let etapaAudio=0;

document.body.addEventListener("click",()=>{
audio.src=trilha[0];
audio.play();
},{once:true});

function go(n){
if(n>=4 && etapaAudio===0){etapaAudio=1;audio.src=trilha[1];audio.play();}
if(n>=9 && etapaAudio===1){etapaAudio=2;audio.src=trilha[2];audio.play();}

document.querySelectorAll('.slide').forEach(s=>s.classList.remove('active'));
document.getElementById('s'+n).classList.add('active');

document.getElementById('progress').style.width=(n/12*100)+"%";

if(n===5){
document.getElementById("textoConsumo").innerHTML =
perfil==="consultor"
? "Você já consome.<br><br>Agora pode transformar isso em renda recorrente."
: "Você já consome.<br><br>Agora pode pagar menos por isso.";
}
}

/* PRELOAD COMPLETO */
let imagens=[
"img/prod1.jpg","img/prod2.jpg","img/prod3.jpg","img/prod4.jpg","img/prod5.jpg",
"img/prod6.jpg","img/prod7.jpg","img/prod8.jpg","img/prod9.jpg","img/prod10.jpg",
"img/prod11.jpg","img/prod12.jpg","img/prod13.jpg",
"img/bonus1.jpg","img/bonus2.jpg","img/bonus3.jpg","img/bonus4.jpg",
"img/bonus5.jpg","img/bonus6.jpg","img/bonus7.jpg"
];
imagens.forEach(src=>{let i=new Image();i.src=src;});

/* PRODUTOS */
let prodImgs=[
"img/prod1.jpg","img/prod2.jpg","img/prod3.jpg","img/prod4.jpg","img/prod5.jpg",
"img/prod6.jpg","img/prod7.jpg","img/prod8.jpg","img/prod9.jpg","img/prod10.jpg",
"img/prod11.jpg","img/prod12.jpg","img/prod13.jpg"
];
let p=0;

function trocarProd(d){
p+=d;
if(p<0)p=prodImgs.length-1;
if(p>=prodImgs.length)p=0;

let el=document.getElementById("prodImg");
el.style.opacity=0.3;
el.style.transform="scale(0.97)";

setTimeout(()=>{
el.src=prodImgs[p];
el.style.opacity=1;
el.style.transform="scale(1)";
},120);
}

/* BONUS */
let bonusImgs=[
"img/bonus1.jpg","img/bonus2.jpg","img/bonus3.jpg",
"img/bonus4.jpg","img/bonus5.jpg","img/bonus6.jpg","img/bonus7.jpg"
];
let b=0;

function trocarBonus(d){
b+=d;
if(b<0)b=bonusImgs.length-1;
if(b>=bonusImgs.length)b=0;

let el=document.getElementById("bonusImg");
el.style.opacity=0.3;
el.style.transform="scale(0.97)";

setTimeout(()=>{
el.src=bonusImgs[b];
el.style.opacity=1;
el.style.transform="scale(1)";
},120);
}

function enviarLead(){
let nome=document.getElementById('nome').value;
let zap=document.getElementById('zap').value;
let nivel=interacoes>12?"alto interesse":"curioso";

let msg=`Nome:${nome} | Perfil:${perfil} | Nivel:${nivel} | Whats:${zap}`;
window.open(`https://wa.me/5522999231211?text=${encodeURIComponent(msg)}`);
}
</script>

<!-- (SEU HTML DAS TELAS PERMANECE EXATAMENTE IGUAL — NÃO ALTEREI) -->

</body>
</html>
